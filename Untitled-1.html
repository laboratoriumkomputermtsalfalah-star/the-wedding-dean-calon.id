<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dean & Calon mbg</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Work+Sans:wght@100..900&display=swap" rel="stylesheet">   

    <!-- SimplyCountdown CSS (Versi CDN Online agar aman dari masalah folder) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simplycountdown.js@1.6.0/dist/themes/default.css">

    <!-- Custom CSS kamu -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="h-100"> 
    
    <section class="hero w-100 vh-100 p-3 mx-auto text-center d-flex justify-content-center align-items-center text-white" style="background-color: #222;">
        <div>
            <h4>Kepada/Bapak/Ibu/Saudara/I, </h4>
            <h1>Dean & Calon MBG</h1>
            <p>Akan Melangsungkan Resepsi Pernikahan Dalam :</p>
            
            <!-- TARGET UTAMA (Pastikan id ini unik) -->
            <div id="hitung-mundur"></div>
            
            <a href="#undangan" class="btn btn-primary btn-lg mt-4">Lihat Undangan</a>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
    <!-- SimplyCountdown JS (Versi CDN Online) -->
    <script src="https://cdn.jsdelivr.net/npm/simplycountdown.js@1.6.0/dist/simplyCountdown.min.js"></script>

    <!-- Script Aktivasi -->
    <script>
        // Menggunakan ID '#' jauh lebih aman daripada Class '.' untuk menghindari konflik CSS
        new simplyCountdown('#hitung-mundur', {
            year: 2026, // Tahun depan
            month: 12,  // Bulan Desember
            day: 25,    // Tanggal 25
            words: { 
                days: { singular: 'hari', plural: 'hari' },
                hours: { singular: 'jam', plural: 'jam' },
                minutes: { singular: 'menit', plural: 'menit' },
                seconds: { singular: 'detik', plural: 'detik' }
            }
        });
    </script>
</body>
</html>
